<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded-square background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0a"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="url(#bg)"/>

  <!-- Bullseye rings -->
  <circle cx="256" cy="256" r="186" fill="none" stroke="#10b981" stroke-width="14" stroke-opacity="0.30"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#10b981" stroke-width="14" stroke-opacity="0.45"/>
  <circle cx="256" cy="256" r="96"  fill="none" stroke="#ef4444" stroke-width="16" stroke-opacity="0.85"/>

  <!-- Crosshair ticks -->
  <g stroke="#10b981" stroke-width="14" stroke-linecap="round" stroke-opacity="0.55">
    <line x1="256" y1="34"  x2="256" y2="70"/>
    <line x1="256" y1="442" x2="256" y2="478"/>
    <line x1="34"  y1="256" x2="70"  y2="256"/>
    <line x1="442" y1="256" x2="478" y2="256"/>
  </g>

  <!-- Bold R, centered on the bullseye -->
  <text x="256" y="258" text-anchor="middle" dominant-baseline="central"
        font-family="Geist, 'Helvetica Neue', Arial, sans-serif"
        font-size="244" font-weight="800" fill="#ffffff" letter-spacing="-6">R</text>

  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1b2a25"/>
      <stop offset="60%" stop-color="#0e1411"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
</svg>
